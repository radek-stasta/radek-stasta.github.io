<div>
  <div class="container mx-auto pt-10">
    <div class="flex flex-row text-xl">
      <!-- CONTENT -->
      <div class="w-full lg:w-2/3 leading-relaxed">
        <div class="mx-4 sm:mx-0" [innerHTML]="articleHtml"></div>
        <div class="mx-4 sm:mx-0">
          <div id="comments" class="text-2xl sm:text-4xl my-8 font-bold">
            {{ "articles.comments" | translate }}
          </div>
          <div class="giscus"></div>
        </div>
      </div>

      <!-- SIDE PANEL -->
      <div
        #sidePanel
        class="absolute side-panel-up lg:relative lg:w-1/3 lg:pl-8 flex flex-col"
      >
        <div class="bg-indigo-100">
          <div
            class="font-bold p-4 text-white text-center bg-gradient-to-r from-indigo-500 to-rose-500"
          >
            {{ "articles.summary" | translate }}
          </div>
          @for (line of summaryLines; track line) {
            <div
              class="my-4 px-4 hover:text-rose-500 hover:underline"
              [innerHTML]="line"
            ></div>
          }
        </div>
        <!-- SIDE PANEL TOGGLE -->
        <button
          class="flex lg:hidden h-8 flex-row place-content-center border-b-2 rounded-b-full bg-indigo-100"
        >
          <svg
            class="h-8 w-8 text-indigo-500"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path stroke="none" d="M0 0h24v24H0z" />
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
