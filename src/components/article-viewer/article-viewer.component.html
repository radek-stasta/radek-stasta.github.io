<script src="https://giscus.app/client.js"
        data-repo="radek-stasta/radek-stasta.github.io"
        data-repo-id="R_kgDOMVlNQw"
        data-category="Announcements"
        data-category-id="DIC_kwDOMVlNQ84ChCUL"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="light"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
</script>

<div class="container mx-auto pt-10">
  <div class=".giscus"></div>
  <div class="grid grid-cols-3 text-xl">
    <!-- CONTENT -->
    <div class="col-span-2 leading-relaxed" [innerHTML]="articleHtml"></div>

    <!-- SIDE PANEL -->
    <div>
      <div class="border-2 ml-8 rounded-xl bg-gradient-to-r bg-indigo-100">
        <div
          class="font-bold p-4 text-white text-center bg-gradient-to-r from-indigo-500 to-rose-500"
        >
          {{ "articles.summary" | translate }}
        </div>
        @for (line of summaryLines; track line) {
          <div
            class="my-4 px-4 hover:text-rose-500 hover:underline"
            [innerHTML]="line"
          ></div>
        }
      </div>
    </div>
  </div>
</div>
