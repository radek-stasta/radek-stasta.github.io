<!-- HEADER -->
<div
  #header
  class="relative h-16 z-10 top-0 bg-gradient-to-r to-indigo-500 from-rose-500"
>
  <div class="flex flex-row text-2xl text-white">
    <button
      tabindex="0"
      class="w-1/3"
      (click)="router.navigateByUrl('/')"
      (keydown.enter)="router.navigateByUrl('/')"
    >
      <img
        class="w-16 p-1"
        ngSrc="/img/myself-round.png"
        alt="Radek Šťasta"
        width="489"
        height="489"
      />
    </button>
    <div class="flex w-1/3 place-content-center">
      <button
        tabindex="0"
        class="px-10 cursor-pointer h-full place-content-center hover:font-bold"
        (click)="
          setArticlesDropdownVisibility(!dataService.isArticleDropdownVisible)
        "
      >
        {{ "articles-link" | translate | uppercase }}
      </button>
    </div>
    <div
      class="flex w-1/3 place-content-end items-center p-1 gap-2 text-gray-400"
    >
      <button
        tabindex="0"
        class="cursor-pointer hover:font-bold"
        [ngClass]="{ 'text-white': dataService.selectedLanguage === 'cz' }"
        (click)="dataService.selectedLanguage = 'cz'"
        (keydown.enter)="dataService.selectedLanguage = 'cz'"
      >
        cz
      </button>
      <button
        tabindex="0"
        class="cursor-pointer hover:font-bold"
        [ngClass]="{ 'text-white': dataService.selectedLanguage === 'en' }"
        (click)="dataService.selectedLanguage = 'en'"
        (keydown.enter)="dataService.selectedLanguage = 'en'"
      >
        en
      </button>
    </div>
  </div>
</div>

@if (dataService.isArticleDropdownVisible) {
  <app-articles-dropdown></app-articles-dropdown>
}

<!-- Scroll to top -->
@if (!isScrolledTop) {
  <button
    class="fixed z-50 cursor-pointer bottom-8 right-8 p-2 bg-indigo-500 rounded-full"
    (click)="scrollToTop()"
    (keydown.enter)="scrollToTop()"
  >
    <svg
      class="h-8 w-8 text-white"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      stroke-width="2"
      stroke="currentColor"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path stroke="none" d="M0 0h24v24H0z" />
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="18" y1="11" x2="12" y2="5" />
      <line x1="6" y1="11" x2="12" y2="5" />
    </svg>
  </button>
}

<!-- CONTENT -->
<div
  #mainDiv
  id="main-div"
  class="main-div overflow-auto"
  (scroll)="onMainDivScroll($event)"
>
  <router-outlet />
</div>
